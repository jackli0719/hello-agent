# Docker Compose — 本地开发数据库
#
# 用法：
#   docker compose up -d      # 启动
#   docker compose down       # 停止（数据保留在 volume）
#   docker compose down -v    # 停止 + 删数据
#
# ⚠️ 不要 docker compose down -v，会丢数据！

services:
  postgres:
    image: postgres:16-alpine
    container_name: o2o-pg-keepalive
    restart: unless-stopped
    environment:
      POSTGRES_USER: o2o
      POSTGRES_PASSWORD: o2o
      POSTGRES_DB: o2o
    ports:
      # 5432 端口被本机其他项目占着，用 5433 避开
      - "5433:5432"
    volumes:
      # 数据持久化：删容器不丢数据
      - o2o_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U o2o"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  o2o_pg_data:
    name: o2o_pg_data
